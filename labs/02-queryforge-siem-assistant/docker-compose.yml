services:
  queryforge:
    build: .
    ports:
      - "8002:8002"
    environment:
      QUERYFORGE_DATABASE_PATH: /app/data/queryforge.db
      QUERYFORGE_DEMO_USERNAME: hunter
      QUERYFORGE_DEMO_PASSWORD: queryforge-demo
      QUERYFORGE_API_KEY: change-me-in-production
    volumes:
      - queryforge-data:/app/data

volumes:
  queryforge-data:
